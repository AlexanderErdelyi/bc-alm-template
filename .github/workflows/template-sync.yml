name: Template sync

# Pulls updates from the bc-alm-template repository and opens a pull request with
# the changes. This runs scripts/Update-FromTemplate.ps1, so it honors the 'sync'
# block in template.config.json exactly like a local run:
#   * customizationsPath - refreshes the relocated .github/agents|skills|instructions
#   * updateModels        - re-applies your agent 'model:' choices when false
#   * updateExtensions    - keeps your .vscode/extensions.json when false
#   * updateInstructions  - keeps your .github/instructions when false
# Your AL code, specs, PROJECT.md and token-injected files are never touched.
#
# Runs weekly and on demand from the Actions tab (Run workflow). Review the PR it
# opens, resolve anything you want to keep, then merge.

on:
  schedule:
    # 06:00 UTC every Monday
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  template-sync:
    runs-on: ubuntu-latest
    # Don't sync the template against itself.
    if: github.repository != 'AlexanderErdelyi/bc-alm-template'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Refresh template-managed files (honors template.config.json sync block)
        shell: pwsh
        run: ./scripts/Update-FromTemplate.ps1 -Branch main

      - name: Open pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/template-sync
          delete-branch: true
          commit-message: "chore(template): sync updates from bc-alm-template"
          title: "chore(template): sync updates from bc-alm-template"
          labels: template-sync
          body: |
            Automated update from
            [bc-alm-template](https://github.com/AlexanderErdelyi/bc-alm-template).

            Refreshed via `scripts/Update-FromTemplate.ps1`, which honors the `sync`
            block in `template.config.json` (customizations location + model/toolset
            toggles). Your AL code, specs, and configured values are untouched.

            Review the diff and merge what you want to keep.
