name: Issue Orchestrator — Intake & Triage

on:
  issues:
    types: [opened, edited, unlabeled, reopened]

permissions:
  issues: write

jobs:
  intake:
    name: Intake & Triage
    # Always run for opened/edited/reopened.
    # For unlabeled, only run when a stage label or needs-info was removed
    # (ignore unrelated label removals to avoid noisy runs).
    if: |
      github.event.action == 'opened' ||
      github.event.action == 'reopened' ||
      github.event.action == 'edited' ||
      (github.event.action == 'unlabeled' &&
       (github.event.label.name == 'needs-info' ||
        startsWith(github.event.label.name, 'stage:')))
    runs-on: ubuntu-latest
    # Queue concurrent runs for the same issue rather than letting them race.
    # This prevents duplicate comments and label-flip races when title and
    # description are saved in quick succession (two 'edited' events).
    concurrency:
      group: issue-orchestrator-${{ github.event.issue.number }}
      cancel-in-progress: false
    steps:
      - name: Ensure labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'stage:intake',           color: '0075ca', description: 'Issue is being triaged' },
              { name: 'stage:planning',          color: 'e4e669', description: 'Issue is ready for planning' },
              { name: 'stage:awaiting-approval', color: 'f9d0c4', description: 'Plan is ready — awaiting manual approval' },
              { name: 'stage:approved',          color: '0e8a16', description: 'Plan approved — ready for implementation' },
              { name: 'stage:implementation',    color: '6f42c1', description: 'Implementation in progress' },
              { name: 'needs-info',              color: 'd93f0b', description: 'More information required from the author' },
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...label,
                });
              } catch (err) {
                if (err.status === 422) {
                  await github.rest.issues.updateLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ...label,
                  });
                } else {
                  throw err;
                }
              }
            }

      - name: Triage issue quality
        id: triage
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = (issue.body || '').trim();
            const title = (issue.title || '').trim();
            const action = context.payload.action;
            const problems = [];

            if (title.length < 10) {
              problems.push('**Title is too short** — please provide a descriptive title (at least 10 characters).');
            }
            if (body.length < 50) {
              problems.push('**Description is missing or too short** — please describe the issue in at least a sentence or two.');
            }

            // Fetch live labels from the API rather than using the stale event
            // payload. Without this, concurrent runs (e.g. title + description
            // edited in quick succession) both see an empty label list and each
            // try to add stage:planning, causing duplicate comments and races.
            const { data: liveIssue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
            });
            const currentLabels = liveIssue.labels.map(l => l.name);

            // Do not reset issues that have already reached implementation
            if (currentLabels.includes('stage:implementation')) {
              core.info('Issue is in stage:implementation — skipping re-triage.');
              return;
            }

            const isRetrigger = action !== 'opened';

            // Ensure stage:intake is always present
            if (!currentLabels.includes('stage:intake')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['stage:intake'],
              });
            }

            if (problems.length > 0) {
              // Remove stage:planning if it was set (quality gate blocks progression)
              if (currentLabels.includes('stage:planning')) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    name: 'stage:planning',
                  });
                } catch (_) {}
              }

              // Add needs-info if not already present
              const needsInfoAlreadySet = currentLabels.includes('needs-info');
              if (!needsInfoAlreadySet) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: ['needs-info'],
                });
              }

              // Post a comment only when first failing (opened) or when the state
              // transitions back to needs-info (re-trigger without prior needs-info label).
              // Avoids repeated identical comments on every edit while still incomplete.
              if (!isRetrigger || !needsInfoAlreadySet) {
                const bullets = problems.map(p => `- ${p}`).join('\n');
                const heading = isRetrigger
                  ? '## Intake & Triage (Re-evaluation) — Action Required'
                  : '## Intake & Triage — Action Required';
                const intro = isRetrigger
                  ? 'The issue was re-evaluated and still has quality gaps before planning can begin:'
                  : 'Thank you for opening this issue!\n\nThe automated triage check found the following quality gaps before planning can begin:';
                const commentLines = [
                  heading,
                  '',
                  intro,
                  '',
                  bullets,
                  '',
                  'Please update the issue with the missing information.',
                  'Once you have updated the title or description, triage will re-run automatically.',
                  'Alternatively, remove the `needs-info` label after fixing the issue to trigger a re-check.',
                  '',
                  '---',
                  '*Automated by the [Issue Orchestrator](.github/ISSUE_ORCHESTRATION.md) — stage: **intake***',
                ];
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: commentLines.join('\n'),
                });
              }
            } else {
              // Quality OK — remove needs-info if present
              if (currentLabels.includes('needs-info')) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    name: 'needs-info',
                  });
                } catch (_) {}
              }

              // Only transition to planning if the issue is not already in a later stage
              const inLaterStage =
                currentLabels.includes('stage:planning') ||
                currentLabels.includes('stage:awaiting-approval') ||
                currentLabels.includes('stage:approved');

              if (!inLaterStage) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: ['stage:planning'],
                });

                const hasAcceptanceCriteria = /accept(ance criteria|ed when)|given.*when.*then/i.test(body);
                const hasStepsOrContext = /step|reproduce|context|background|problem|goal|why|what/i.test(body);
                const suggestions = [];
                if (!hasAcceptanceCriteria) {
                  suggestions.push('- Consider adding acceptance criteria (GIVEN / WHEN / THEN) to help scope the implementation.');
                }
                if (!hasStepsOrContext) {
                  suggestions.push('- Consider adding context or steps to reproduce to support planning.');
                }
                const suggestionBlock = suggestions.length
                  ? '\n**Optional improvements:**\n' + suggestions.join('\n') + '\n'
                  : '';

                const heading = isRetrigger
                  ? '## Intake & Triage (Re-evaluation) — Passed ✅'
                  : '## Intake & Triage — Passed';
                const intro = isRetrigger
                  ? 'The issue has been re-evaluated and now meets quality standards.'
                  : 'This issue has been triaged and looks ready for planning.';
                const commentLines = [
                  heading,
                  '',
                  intro,
                  suggestionBlock,
                  'The **planning stage** will start automatically now.',
                  '',
                  '---',
                  '*Automated by the [Issue Orchestrator](.github/ISSUE_ORCHESTRATION.md) — stage: **intake → planning***',
                ];
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: commentLines.join('\n'),
                });

                // Signal to the next step that planning should run inline.
                // GitHub Actions does not trigger workflows from events fired by
                // GITHUB_TOKEN (anti-recursion guard), so we cannot rely on the
                // stage:planning labeled event to start issue-planning.yml.
                core.setOutput('planning_needed', 'true');
              }
            }

      - name: Generate and publish plan
        # Runs inline because GitHub Actions does not fire workflow triggers for
        # events (like 'labeled') that are created by GITHUB_TOKEN. The
        # issue-planning.yml workflow still handles the case where a maintainer
        # manually adds the stage:planning label.
        if: steps.triage.outputs.planning_needed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = (issue.body || '').trim();
            const title = (issue.title || '').trim();
            const url = issue.html_url;
            const now = new Date().toISOString().split('T')[0];

            const truncatedBody = body.length > 800
              ? body.slice(0, 800) + '\n... (truncated — see issue for full text)'
              : body;

            const planLines = [
              '## Planning — Draft Plan',
              '',
              `> **Issue:** [#${issue.number} ${title}](${url})`,
              `> **Generated:** ${now}`,
              '',
              '---',
              '',
              '### 1. Summary',
              '',
              '> _(A maintainer or Copilot agent should refine this section before approving.)_',
              '',
              '---',
              '',
              '### 2. Scope',
              '',
              '| In Scope | Out of Scope |',
              '|---|---|',
              '| _(to be filled)_ | _(to be filled)_ |',
              '',
              '---',
              '',
              '### 3. Proposed Implementation Approach',
              '',
              '- [ ] Identify affected AL objects / areas',
              '- [ ] Create or update spec documents under `specs/<ticket-id>-<short-name>/`',
              '  - `brief.md`',
              '  - `plan.md`',
              '  - `acceptance-criteria.md`',
              '- [ ] Open a feature branch: `feature/<ticket-id>-<short-name>`',
              '- [ ] Implement AL changes per [coding standards](.github/instructions/al-coding-standards.instructions.md)',
              '- [ ] Write GIVEN/WHEN/THEN test codeunit',
              '- [ ] Bump `app.json` version (minor for feature, build for fix)',
              '',
              '---',
              '',
              '### 4. Issue Description (reference)',
              '',
              '```',
              truncatedBody,
              '```',
              '',
              '---',
              '',
              '### 5. Risk & Notes',
              '',
              '- _No risks identified at this stage — update before approving._',
              '',
              '---',
              '',
              '### How to approve',
              '',
              'A maintainer must review this plan and apply the `stage:approved` label to the issue to authorise implementation.',
              '',
              '> **Do not apply `stage:approved` until the plan above has been reviewed and refined.**',
              '',
              '---',
              `*Automated by the [Issue Orchestrator](.github/ISSUE_ORCHESTRATION.md) — stage: **planning***`,
            ];

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: planLines.join('\n'),
            });

            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: 'stage:planning',
              });
            } catch (_) {}

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['stage:awaiting-approval'],
            });
